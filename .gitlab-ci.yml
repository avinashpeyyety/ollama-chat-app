# GitLab Pages — publishes website/ as the project landing page
# URL: https://<namespace>.gitlab.io/ollama-chat-app/

pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir -p public
    - cp -r website/* public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main"