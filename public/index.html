<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ollama Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-icon">◎</div>
          <div>
            <h1>Ollama</h1>
            <p>local · https</p>
          </div>
        </div>

        <label class="field">
          <span>model</span>
          <select id="model-select">
            <option value="">loading...</option>
          </select>
        </label>

        <label class="field toggle-field">
          <span>think</span>
          <input type="checkbox" id="think-toggle" />
        </label>

        <button id="new-chat" class="secondary-btn">new chat</button>

        <div class="server-panel">
          <div class="server-panel-head">
            <span id="server-status-dot" class="server-dot offline"></span>
            <span class="server-panel-label">server</span>
            <span id="server-status-text" class="server-status-text">checking...</span>
          </div>
          <div class="server-actions">
            <button id="server-start" type="button" class="secondary-btn server-btn">start</button>
            <button id="server-stop" type="button" class="secondary-btn server-btn">stop</button>
            <button id="server-restart" type="button" class="secondary-btn server-btn">restart</button>
          </div>
        </div>

        <div class="history-panel">
          <div class="history-label">history</div>
          <div id="history-list" class="history-list"></div>
        </div>

        <div class="status" id="status">Connecting to Ollama...</div>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div>
            <h2 id="active-model">select model</h2>
            <p>attach files · stream responses · all models runs in parallel</p>
          </div>
        </header>

        <section id="messages" class="messages">
          <div class="empty-state">
            <h3>ready</h3>
            <p>pick a model and send a message</p>
          </div>
        </section>

        <form id="chat-form" class="composer">
          <div class="composer-main">
            <div id="attachments" class="attachments hidden"></div>
            <div class="composer-row">
              <input
                id="file-input"
                type="file"
                multiple
                accept=".txt,.md,.json,.js,.ts,.tsx,.jsx,.py,.rb,.go,.rs,.java,.c,.cpp,.h,.css,.html,.xml,.yaml,.yml,.csv,.sql,.sh,.toml,.log,.env,image/*"
                hidden
              />
              <button id="attach-btn" type="button" class="attach-btn" title="Attach files" disabled>📎</button>
              <textarea
                id="message-input"
                rows="1"
                placeholder="message..."
                disabled
              ></textarea>
              <button id="send-btn" type="submit" disabled>send</button>
            </div>
          </div>
        </form>
      </main>
    </div>

    <script src="/app.js?v=14"></script>
  </body>
</html>
